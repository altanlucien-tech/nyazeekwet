<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Shwe Taike</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('/static/images/401f0a2abafc6569d1dbff12b3a8c5e5.jpg');
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            min-height: 100vh; /* Screen အရှည်တွင် နောက်ခံမပြတ်စေရန် min-height ကိုသုံးသည် */
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; /* Mobile ဘေးဘောင်အတွက် padding လျှော့ထားသည် */
        }
        .register-container {
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 30px; 
            padding: 30px 25px; /* Padding ကို ပိုမိုမျှတအောင် ပြင်ထားသည် */
            width: 95%; /* Mobile တွင် ဘေးမကပ်စေရန် % ကိုသုံးသည် */
            max-width: 450px; 
            color: white;
            margin: 20px 0; /* Container အပေါ်အောက် လွတ်စေရန် */
        }
        h1 { 
            text-align: center; 
            font-size: clamp(1.8rem, 8vw, 2.2rem); /* Screen အလိုက် စာလုံးအရွယ်အစား အလိုအလျောက် ပြောင်းမည် */
            margin-bottom: 5px; 
        }
        .subtitle { text-align: center; margin-bottom: 25px; font-size: 0.9rem; line-height: 1.4; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; opacity: 0.9; }
        
        input { 
            width: 100%; 
            padding: 12px 15px; 
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 12px; 
            color: white; 
            margin-bottom: 15px;
            font-size: 1rem; /* Mobile တွင် focus ဖြစ်ပါက zoom မဝင်စေရန် ၁၆px သုံးသည် */
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #52a8b3; background: rgba(255, 255, 255, 0.15); }

        .signup-btn { 
            width: 100%; 
            padding: 14px; 
            background: #52a8b3; 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-weight: bold; 
            font-size: 1.1rem;
            cursor: pointer; 
            transition: 0.3s;
            margin-top: 10px;
        }
        .signup-btn:hover { background: #46919c; transform: translateY(-2px); }
        
        .help-text { font-size: 0.75rem; color: rgba(255, 255, 255, 0.6); margin-top: -10px; margin-bottom: 15px; line-height: 1.3; }

        /* Tablet နှင့် Desktop အတွက် သီးသန့်ပြင်ဆင်ချက် */
        @media (min-width: 768px) {
            .register-container { padding: 40px; }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>Register</h1>
        <p class="subtitle">Create a new account to explore library</p>
        <form method="POST">
            {% csrf_token %}
            <label>Username:</label>
            <input type="text" name="username" required>
            <p class="help-text">Required. 150 characters or fewer.</p>
            
            <label>Email address:</label>
            <input type="email" name="email" required>
            <p class="help-text">Required for password recovery.</p>
            
            <label>Password:</label>
            <input type="password" name="password" required>
            
            <label>Password confirmation:</label>
            <input type="password" name="password_confirm" required>
            
            <button type="submit" class="signup-btn">Sign Up</button>
        </form>
    </div>
</body>
</html>
