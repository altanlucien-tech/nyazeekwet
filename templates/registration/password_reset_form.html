<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - JS Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: #0f172a url("/static/images/401f0a2abafc6569d1dbff12b3a8c5e5.jpg") center/cover no-repeat fixed;
            display: flex; justify-content: center; align-items: center;
        }
        .glass-box {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 90%; /* Mobile Responsive */
            max-width: 400px;
            text-align: center; color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            margin: 20px;
        }
        h2 { margin-bottom: 10px; font-size: 1.5rem; color: #4da3af; }
        p { font-size: 0.9rem; color: #cbd5e1; margin-bottom: 20px; line-height: 1.5; }
        input[type="email"], input[type="password"], input[type="text"] {
            width: 100%; padding: 12px; margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px; color: white; outline: none;
            box-sizing: border-box; /* Padding ကြောင့် အပြင်မထွက်စေရန် */
        }
        .btn {
            background: #4da3af; color: white; border: none;
            padding: 12px; width: 100%; border-radius: 10px;
            font-weight: 600; cursor: pointer; transition: 0.3s;
            font-size: 1rem;
        }
        .btn:hover { background: #3d8d99; }
        
        /* Mobile Portrait Screens */
        @media (max-width: 480px) {
            .glass-box { padding: 20px; }
            h2 { font-size: 1.3rem; }
            p { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="glass-box">
        <i class="fas fa-lock-open" style="font-size: 35px; color: #4da3af; margin-bottom: 15px;"></i>
        <h2>Forgot Password?</h2>
        <p>သင့်အကောင့် Email ကို ရိုက်ထည့်ပါ။ စကားဝှက်အသစ်သတ်မှတ်ရန် Link ကို ပို့ပေးပါမည်။</p>
        <form method="post">
            {% csrf_token %}
            <input type="email" name="email" placeholder="Email address" required>
            <button type="submit" class="btn">Send Reset Link</button>
        </form>
    </div>
</body>
</html>
