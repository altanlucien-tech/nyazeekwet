<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent - JS Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* CSS အပေါ်ကအတိုင်း (နမူနာအနေဖြင့် ကျစ်လျစ်အောင်ထားသည်) */
        body { margin: 0; min-height: 100vh; background: #0f172a url("/static/images/401f0a2abafc6569d1dbff12b3a8c5e5.jpg") center/cover; display: flex; justify-content: center; align-items: center; font-family: 'Poppins', sans-serif; }
        .glass-box { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(15px); padding: 40px 25px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.15); width: 88%; max-width: 400px; text-align: center; color: white; margin: 15px; }
        h2 { color: #4da3af; margin-bottom: 15px; font-size: clamp(1.2rem, 5vw, 1.5rem); }
        p { color: #cbd5e1; font-size: 0.9rem; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="glass-box">
        <i class="fas fa-paper-plane" style="font-size: 40px; color: #4da3af; margin-bottom: 20px;"></i>
        <h2>Email Sent!</h2>
        <p>စကားဝှက်အသစ်သတ်မှတ်ရန် လမ်းညွှန်ချက်ကို သင့် Email ထဲသို့ ပို့ပေးလိုက်ပါပြီ။</p>
        <p style="font-size: 0.75rem; color: #94a3b8; margin: 15px 0 25px;">(In-box ထဲမှာ မတွေ့ပါက Spam folder ကို စစ်ဆေးပါ)</p>
        <a href="{% url 'login' %}" style="color: #4da3af; text-decoration: none; font-weight: 600; border: 1px solid #4da3af; padding: 10px 20px; border-radius: 10px; display: inline-block;">Back to Login</a>
    </div>
</body>
</html>
