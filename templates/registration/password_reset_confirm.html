<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset New Password - JS Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    {% load static %}
    <style>
        /* CSS အပေါ်ကအတိုင်း (Responsive Style) */
        body { margin: 0; min-height: 100vh; background: #0f172a url("{% static 'images/401f0a2abafc6569d1dbff12b3a8c5e5.jpg' %}") center/cover; display: flex; justify-content: center; align-items: center; font-family: 'Poppins', sans-serif; }
        .glass-box { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(15px); padding: 35px 25px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.15); width: 88%; max-width: 400px; color: white; }
        h2 { color: #4da3af; text-align: center; margin-bottom: 20px; }
        .btn { background: #4da3af; color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        
        /* Django Form Styling */
        form p { text-align: left; font-size: 0.85rem; color: #cbd5e1; margin-top: 10px; }
        form input { width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 10px; color: white; box-sizing: border-box; }
        ul { padding-left: 15px; font-size: 0.75rem; color: #94a3b8; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="glass-box">
        <h2>New Password</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Update Password</button>
        </form>
    </div>
</body>
</html>
